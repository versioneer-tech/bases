        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: session-manager
      volumes:
        - name: config
          secret:
            secretName: educates-config
        - name: token
          secret:
            secretName: session-manager-token
---
apiVersion: secrets.educates.dev/v1beta1
kind: SecretCopier
metadata:
  annotations: {}
  name: educates-ingress-secrets
spec:
  rules:
    - sourceSecret:
        name: ${TLS_CERTIFICATE_REF_NAME}
        namespace: ${TLS_CERTIFICATE_REF_NAMESPACE}
      targetNamespaces:
        nameSelector:
          matchNames:
            - educates
---
apiVersion: secrets.educates.dev/v1beta1
kind: SecretInjector
metadata:
  annotations: {}
  name: educates-registry-credentials
spec:
  rules:
    - serviceAccounts:
        nameSelector:
          matchNames:
            - default
      sourceSecrets:
        nameSelector:
          matchNames:
            - educates-registry-credentials
      targetNamespaces:
        labelSelector:
          matchLabels:
            training.educates.dev/component: session
