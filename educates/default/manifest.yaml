apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  name: secrets-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      deployment: secrets-manager
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        deployment: secrets-manager
    spec:
      automountServiceAccountToken: false
      containers:
        - image: ghcr.io/educates/educates-secrets-manager@sha256:d0fd4ef9b732c580862ea8fbde6ac34f579b481872e5409708cf51f16a36072a
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz?probe=liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: operator
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            failureThreshold: 4
            httpGet:
              path: /healthz?probe=startup
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /opt/app-root/config/
              name: config
            - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              name: token
              readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: secrets-manager
      volumes:
        - name: config
          secret:
            secretName: educates-config
        - name: token
          secret:
            secretName: secrets-manager-token
---
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.educates.dev/extends-workshop-permissions: "true"
