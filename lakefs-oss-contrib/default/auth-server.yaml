apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: auth-server
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: lakefs-oss-contrib
  name: lakefs-oss-contrib-auth-server
  namespace: lakefs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lakefs-oss-contrib-auth-server-role
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - pkg.internal
    resources:
      - lakefsusers
      - lakefsgroups
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - pkg.internal
    resources:
      - lakefsroles
      - lakefsrolebindings
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - pkg.internal
    resources:
      - lakefscredentials
    verbs:
      - create
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lakefs-oss-contrib-auth-server-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lakefs-oss-contrib-auth-server-role
subjects:
  - kind: ServiceAccount
    name: lakefs-oss-contrib-auth-server
    namespace: lakefs
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: auth-server
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: lakefs-oss-contrib
  name: lakefs-oss-contrib-auth-server
  namespace: lakefs
spec:
  ports:
    - name: auth-http
      port: 80
      protocol: TCP
      targetPort: auth-http
    - name: metrics
      port: 8081
      protocol: TCP
      targetPort: metrics
  selector:
    app.kubernetes.io/component: auth-server
    app.kubernetes.io/name: lakefs-oss-contrib
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: auth-server
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: lakefs-oss-contrib
  name: lakefs-oss-contrib-auth-server
  namespace: lakefs
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: auth-server
      app.kubernetes.io/name: lakefs-oss-contrib
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: auth-server
      labels:
        app.kubernetes.io/component: auth-server
        app.kubernetes.io/name: lakefs-oss-contrib
    spec:
      containers:
        - args:
            - --auth-server-bind-address=:8080
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
            - --default-user-namespace=$(POD_NAMESPACE)
          command:
            - /app
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: ghcr.io/versioneer-tech/lakefs-oss-contrib/auth-server:0.1.2
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          name: auth-server
          ports:
            - containerPort: 8080
              name: auth-http
              protocol: TCP
            - containerPort: 8081
              name: metrics
              protocol: TCP
            - containerPort: 8082
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: lakefs-oss-contrib-auth-server
      terminationGracePeriodSeconds: 10
