---
# Source: lakefs/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: lakefs
  labels:
    helm.sh/chart: lakefs-1.10.0
    app: lakefs
    app.kubernetes.io/name: lakefs
    app.kubernetes.io/instance: lakefs
    app.kubernetes.io/version: "1.84.0"
    app.kubernetes.io/managed-by: Helm
type: Opaque
data: {}
---
# Source: lakefs/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: lakefs
data:
  config.yaml:
  |
    logging:
      level: INFO
    stats:
      enabled: false
  
    database:
      type: local
    blockstore:
      type: s3
      s3:
        region: ${LAKEFS_BLOCKSTORE_REGION}
        endpoint: ${LAKEFS_BLOCKSTORE_ENDPOINT}
        discover_bucket_region: false
        force_path_style: true
    gateways:
      s3:
        region: ${LAKEFS_BLOCKSTORE_REGION}
        domain_name: ${LAKEFS_S3_DOMAIN_NAME}
    tls:
      enabled: true
      cert_file: /etc/lakefs/tls/tls.crt
      key_file: /etc/lakefs/tls/tls.key
  
    auth:
      ui_config:
        rbac: simplified
      api:
        endpoint: http://lakefs-oss-contrib-auth-server.lakefs.svc/auth/v1
  
    installation:
      user_name: ${LAKEFS_INSTALLATION_USER_NAME}
      access_key_id: ${LAKEFS_INSTALLATION_ACCESS_KEY_ID}
      secret_access_key: ${LAKEFS_INSTALLATION_SECRET_ACCESS_KEY}
---
# Source: lakefs/templates/service.yaml
