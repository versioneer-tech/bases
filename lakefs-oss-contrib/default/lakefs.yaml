  selector:
    app: lakefs
    app.kubernetes.io/name: lakefs
    app.kubernetes.io/instance: lakefs
---
# Source: lakefs/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakefs
  labels:
    helm.sh/chart: lakefs-1.10.0
    app: lakefs
    app.kubernetes.io/name: lakefs
    app.kubernetes.io/instance: lakefs
    app.kubernetes.io/version: "1.84.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakefs
      app.kubernetes.io/name: lakefs
      app.kubernetes.io/instance: lakefs
  template:
    metadata:
      annotations:
        checksum/config: 69cf5128e0f67e14b9bff51cab6e010648ab5b797224f0a38369e38728c226cb
      labels:
        app: lakefs
        app.kubernetes.io/name: lakefs
        app.kubernetes.io/instance: lakefs
    spec:
      serviceAccountName: default
      securityContext:
        null
      containers:
        - name: lakefs
          args: ["run", "--config", "/etc/lakefs/config.yaml"]
          securityContext:
            null
          image: "treeverse/lakefs:1.81.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8000
              protocol: TCP
          readinessProbe:   
            httpGet:
              scheme: HTTPS
              path: /_health
              port: https
          livenessProbe:                                                
            httpGet:
              scheme: HTTPS
              path: /_health
              port: https
          resources:
            {}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/lakefs/config.yaml
              subPath: "config.yaml"
              readOnly: true
            - name: tls
              mountPath: /etc/lakefs/tls
              readOnly: true
          env:
            - name: LAKEFS_AUTH_ENCRYPT_SECRET_KEY
              value: asdjfhjaskdhuioaweyuiorasdsjbaskcbkj
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  key: AWS_ACCESS_KEY_ID
                  name: lakefs-blockstore
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: AWS_SECRET_ACCESS_KEY
                  name: lakefs-blockstore
        
        
        
        
      volumes:
        
        - name: config-volume
          configMap:
            name: lakefs
            items:
              - key: config.yaml
                path: config.yaml
        - name: tls
          secret:
            secretName: lakefs-tls
